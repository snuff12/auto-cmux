version: "0.1"
project:
  name: auto-cmux
  clis: [claude, codex]

agents:
  assignment:
    mode: manual
    stallTimeoutSec: 120
  roles:
    - id: researcher
      cli: claude
      model: sonnet
      description: "Technical research, analysis, and documentation"
      instructions: .auto-cmux/roles/researcher.md

reactions: []

git:
  worktreeEnabled: true
  branchPrefix: "agent/"

costs:
  dailyLimitCents: 2500
  warnAt: 0.8
